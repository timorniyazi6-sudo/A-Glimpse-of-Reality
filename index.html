<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Global Hakikat Arşivi | Timor & Alfred</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>
        body { margin: 0; padding: 0; background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #000; }

        /* KONTROLLER */
        #left-controls {
            position: fixed; top: 20px; left: 20px; z-index: 10001;
            display: flex; flex-direction: column; gap: 10px;
        }
        .control-box {
            background: rgba(0, 0, 0, 0.95); border: 1px solid #ff0000;
            border-radius: 4px; padding: 10px; display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }
        .lang-btn, .zoom-btn {
            background: none; border: none; color: #666; cursor: pointer;
            font-weight: 900; transition: 0.3s; font-size: 14px; outline: none;
        }
        .lang-btn.active, .zoom-btn:hover { color: #ff0000; text-shadow: 0 0 8px #ff0000; }

        /* MANİFESTO PANELİ */
        #manifesto-panel {
            position: fixed; bottom: 20px; left: 20px; width: 350px;
            background: rgba(5, 5, 5, 0.98); border: 2px solid #ff0000;
            padding: 20px; z-index: 10005; transition: 0.5s ease;
            cursor: pointer; overflow: hidden; box-shadow: 0 0 30px #000;
        }
        #manifesto-panel.expanded { width: 45vw; height: 70vh; cursor: default; overflow-y: auto; }
        .manifesto-quote { color: #fff; font-size: 15px; font-weight: bold; margin-bottom: 10px; border-left: 4px solid #ff0000; padding-left: 12px; }
        .manifesto-body { color: #aaa; font-size: 13px; line-height: 1.7; margin-top: 20px; }
        .manifesto-credits { margin-top: 20px; color: #ff0000; font-weight: 900; font-size: 12px; }

        /* SAĞ SIDEBAR */
        #sidebar { 
            position: fixed; top: 0; right: -500px; width: 450px; height: 100%; 
            background: rgba(5, 5, 5, 0.98); border-left: 2px solid #ff0000;
            z-index: 10002; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); 
            padding: 30px; overflow-y: auto; box-shadow: -20px 0 50px #000;
        }
        #sidebar.active { right: 0; }
        .close-btn { color: #ff0000; cursor: pointer; float: right; font-size: 35px; margin-top: -15px; }

        /* RESİM VE AI KUTULARI */
        #s-image-container {
            width: 100%; height: 250px; background: #000; border: 1px solid #333;
            margin-bottom: 20px; display: none; align-items: center; justify-content: center; overflow: hidden;
            border-radius: 4px;
        }
        #s-image-container img { width: 100%; height: 100%; object-fit: cover; }

        #ai-prediction-box {
            background: #1a0000; border-left: 4px solid #ff0000;
            padding: 15px; margin: 15px 0; font-style: italic; color: #ffcccc; font-size: 13px;
        }

        #ai-analysis-container {
            margin-top: 25px; padding: 15px; background: rgba(255, 0, 0, 0.1);
            border: 1px dashed #ff0000; border-radius: 8px;
        }
        #ai-btn {
            background: #ff0000; color: white; border: none; padding: 12px;
            width: 100%; border-radius: 4px; cursor: pointer; font-weight: 900;
            margin-top: 10px; transition: 0.3s;
        }
        #ai-loader { display: none; text-align: center; margin: 10px 0; color: #ff0000; }

        /* MOBİL DÜZENLEMELER */
        @media (max-width: 768px) {
            #sidebar { width: 85vw; right: -90vw; padding: 20px; }
            #manifesto-panel { width: 45px; height: 45px; padding: 0; display: flex; align-items: center; justify-content: center; }
            #manifesto-panel::before { content: "\f129"; font-family: "Font Awesome 5 Free"; font-weight: 900; color: #ff0000; font-size: 20px; }
            #manifesto-panel #m-quote, #manifesto-panel #m-body { display: none; }
            #manifesto-panel.expanded { width: 90vw; height: 80vh; padding: 20px; display: block; }
            #manifesto-panel.expanded::before { display: none; }
            #manifesto-panel.expanded #m-quote, #manifesto-panel.expanded #m-body { display: block; }
        }

        .marker-cluster div { background-color: rgba(255, 0, 0, 0.9); color: #fff; font-weight: bold; }
        .marker-cluster { background-color: rgba(255, 0, 0, 0.1); }
    </style>
</head>
<body>

    <div id="left-controls">
        <div class="control-box">
            <button class="lang-btn active" onclick="changeLang('tr', event)">TR</button>
            <button class="lang-btn" onclick="changeLang('en', event)">EN</button>
            <button class="lang-btn" onclick="changeLang('de', event)">DE</button>
        </div>
        <div class="control-box">
            <button class="zoom-btn" onclick="map.zoomIn()">+</button>
            <button class="zoom-btn" onclick="map.zoomOut()">−</button>
        </div>
    </div>

    <div id="manifesto-panel" onclick="toggleManifesto(event)">
        <span id="m-quote" class="manifesto-quote">"Yurtta Sulh, Cihanda Sulh."</span>
        <div id="m-body" class="manifesto-body">
            <span id="m-text"></span>
            <div class="manifesto-credits">CURATION: TIMOR NIYAZI | STRATEGY: ALFRED BÖHLER</div>
            <div style="margin-top:10px; color:#ff0000; font-size: 11px;">timor.niyazi6@gmail.com</div>
        </div>
    </div>

    <div id="map"></div>

    <div id="sidebar">
        <span class="close-btn" onclick="closeAllPanels()">&times;</span>
        <div id="sidebar-content">
            <div id="s-image-container"><img id="s-image" src="" alt="Evidence"></div>
            <h2 id="s-title" style="color: #ff0000; font-size: 24px; font-weight: 900; margin-top: 0;"></h2>
            <div id="s-date" style="color: #444; font-size: 14px; margin-bottom: 20px;"></div>
            <div id="ai-prediction-box"><strong>PROJECTION:</strong> <span id="s-prediction"></span></div>
            <div id="s-details"></div>
            
            <div id="ai-analysis-container">
                <h4 style="color: #ff0000; margin: 0; font-size: 14px;"><i class="fas fa-robot"></i> AI FORENSIC ANALYST</h4>
                <div id="ai-result-text" style="font-size: 12px; color: #ccc; margin-top: 10px;">Analiz için motoru başlatın.</div>
                <div id="ai-loader"><i class="fas fa-sync fa-spin"></i> Desenler taranıyor...</div>
                <button id="ai-btn" onclick="runAiAnalysis()">DERİN ANALİZİ BAŞLAT</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <script>
        let currentLang = 'tr';
        let lastSelected = null;
        const apiKey = "AIzaSyDgXjOXjDuTENAALOAknM-_jVpxxV1rg8w";

        const translations = {
            tr: {
                quote: `"Yurtta Sulh, Cihanda Sulh." <br><small>— Mustafa Kemal Atatürk</small>`,
                text: `Bizler, <strong>Timor Niyazi</strong> ve <strong>Alfred Böhler</strong>, insanlığın en karanlık döngüsüne tanıklık ediyoruz. İkinci Dünya Savaşı'nda katledilen milyonlardan sonra dünyanın ders aldığı illüzyonu, tarihin en trajik yanılgısıdır. Eğer insanlık Birinci Dünya Savaşı'nın dehşetini gerçekten anlasaydı, ikincisi asla gerçekleşmezdi. Petrol hırsı ve hegemonya arayışı, insan hayatını istatistiklere indirgedi.`
            },
            en: {
                quote: `"Peace at Home, Peace in the World." <br><small>— Mustafa Kemal Atatürk</small>`,
                text: `We, <strong>Timor Niyazi</strong> and <strong>Alfred Böhler</strong>, bear witness to humanity's darkest loop. The illusion that the world learned its lesson after WWII is history's most tragic fallacy. Insatiable hunger for oil and the quest for absolute hegemony have reduced human life to mere statistics.`
            },
            de: {
                quote: `"Friede in der Heimat, Friede in der Welt." <br><small>— Mustafa Kemal Atatürk</small>`,
                text: `Wir, <strong>Timor Niyazi</strong> und <strong>Alfred Böhler</strong>, bezeugen den dunkelsten Kreislauf der Menschheit. Gier und das Streben nach absoluter Hegemonie haben Menschenleben zu bloßen Statistiken degradiert.`
            }
        };

        const map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([20, 10], 2.5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        const clusterGroup = L.markerClusterGroup();

        function closeAllPanels() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('manifesto-panel').classList.remove('expanded');
        }

        function toggleManifesto(e) {
            L.DomEvent.stopPropagation(e);
            document.getElementById('manifesto-panel').classList.toggle('expanded');
        }

        function changeLang(lang, e) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            if(e) e.target.classList.add('active');
            document.getElementById('m-quote').innerHTML = translations[currentLang].quote;
            document.getElementById('m-text').innerHTML = translations[currentLang].text;
            if(lastSelected) updateSidebar(lastSelected);
        }

        function updateSidebar(item) {
            lastSelected = item;
            document.getElementById('s-title').innerText = item.name[currentLang];
            document.getElementById('s-date').innerText = "YEAR: " + item.start;
            document.getElementById('s-prediction').innerText = item.ai_prediction[currentLang];
            document.getElementById('ai-result-text').innerText = "Analiz için motoru başlatın.";
            
            const imgBox = document.getElementById('s-image-container');
            const img = document.getElementById('s-image');
            if (item.q10_img) { img.src = item.q10_img; imgBox.style.display = 'flex'; } else { imgBox.style.display = 'none'; }
            
            let html = "";
            const d = item.details[currentLang];
            for (let i = 1; i <= 10; i++) {
                if(d[`q${i}_title`]) {
                    html += `<div style="margin-bottom:15px;"><div style="color:#fff; font-size:13px; font-weight:800;">${d[`q${i}_title`]}</div><div style="color:#999; font-size:12.5px;">${d[`q${i}_text`]}</div></div>`;
                }
            }
            document.getElementById('s-details').innerHTML = html;
            document.getElementById('sidebar').classList.add('active');
        }

        async function runAiAnalysis() {
            if(!lastSelected) return;
            const resText = document.getElementById('ai-result-text');
            const loader = document.getElementById('ai-loader');
            const btn = document.getElementById('ai-btn');
            resText.style.display = 'none';
            loader.style.display = 'block';
            btn.disabled = true;

            try {
                const prompt = `Analiz Et: ${lastSelected.name[currentLang]}. Detaylar: ${JSON.stringify(lastSelected.details[currentLang])}. Bu olayın idari suç boyutunu profesyonel ve sarsıcı bir dille Türkçe açıkla.`;
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                resText.innerText = data.candidates[0].content.parts[0].text;
            } catch (err) { resText.innerText = "Bağlantı hatası."; }
            finally { resText.style.display = 'block'; loader.style.display = 'none'; btn.disabled = false; }
        }

        async function startApp() {
            changeLang('tr');
            const response = await fetch('archive_data.json');
            const data = await response.json();
            data.forEach(item => {
                const marker = L.circleMarker([item.lat, item.lng], { radius: 6, fillColor: "#ff0000", color: "#fff", weight: 1, fillOpacity: 0.8 });
                marker.on('click', (e) => { L.DomEvent.stopPropagation(e); updateSidebar(item); map.flyTo([item.lat, item.lng], 7); });
                clusterGroup.addLayer(marker);
            });
            map.addLayer(clusterGroup);
        }
        startApp();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Global Hakikat Arşivi | Timor & Alfred</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>
        body { margin: 0; padding: 0; background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #000; z-index: 1; }

        /* SOL ÜST: KONTROLLER */
        #left-controls {
            position: fixed; top: 20px; left: 20px; z-index: 10001;
            display: flex; flex-direction: column; gap: 10px;
        }
        .control-box {
            background: rgba(0, 0, 0, 0.95); border: 1px solid #ff0000;
            border-radius: 4px; padding: 10px; display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }
        .lang-btn, .zoom-btn {
            background: none; border: none; color: #666; cursor: pointer;
            font-weight: 900; transition: 0.3s; font-size: 14px; outline: none;
        }
        .lang-btn.active, .zoom-btn:hover { color: #ff0000; text-shadow: 0 0 8px #ff0000; }

        /* MANİFESTO PANELİ */
        #manifesto-panel {
            position: fixed; bottom: 20px; left: 20px; width: 350px;
            background: rgba(5, 5, 5, 0.98); border: 2px solid #ff0000;
            padding: 20px; z-index: 10005; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer; box-shadow: 0 0 30px #000;
        }
        #manifesto-panel.expanded { width: 450px; max-height: 80vh; cursor: default; overflow-y: auto; }
        .manifesto-quote { color: #fff; font-size: 15px; font-weight: bold; margin-bottom: 5px; border-left: 4px solid #ff0000; padding-left: 12px; display: block; }
        .manifesto-subquote { color: #666; font-size: 12px; margin-bottom: 15px; display: block; padding-left: 16px; }
        .manifesto-body { color: #aaa; font-size: 13px; line-height: 1.6; margin-top: 15px; display: none; }
        #manifesto-panel.expanded .manifesto-body { display: block; }
        .manifesto-credits { margin-top: 20px; color: #ff0000; font-weight: 900; font-size: 11px; line-height: 1.5; }
        .m-hint { font-size: 9px; color: #444; margin-top: 10px; text-transform: uppercase; }

        /* SAĞ SIDEBAR */
        #sidebar { 
            position: fixed; top: 0; right: -500px; width: 450px; height: 100%; 
            background: rgba(5, 5, 5, 0.98); border-left: 2px solid #ff0000;
            z-index: 10002; transition: 0.5s ease-in-out; 
            padding: 30px; overflow-y: auto; box-shadow: -20px 0 50px #000;
        }
        #sidebar.active { right: 0; }
        .close-btn { color: #ff0000; cursor: pointer; float: right; font-size: 35px; margin-top: -15px; }

        #s-image-container {
            width: 100%; height: 250px; background: #000; border: 1px solid #333;
            margin-bottom: 20px; display: none; align-items: center; justify-content: center; overflow: hidden;
        }
        #s-image-container img { width: 100%; height: 100%; object-fit: cover; }

        #ai-analysis-container {
            margin-top: 25px; padding: 15px; background: rgba(255, 0, 0, 0.1);
            border: 1px dashed #ff0000; border-radius: 8px;
        }
        #ai-btn {
            background: #ff0000; color: white; border: none; padding: 12px;
            width: 100%; border-radius: 4px; cursor: pointer; font-weight: 900;
            margin-top: 10px; transition: 0.3s;
        }
        #ai-loader { display: none; text-align: center; margin: 10px 0; color: #ff0000; }

        @media (max-width: 768px) {
            #sidebar { width: 90vw; right: -100vw; }
            #manifesto-panel { width: 45px; height: 45px; padding: 0; display: flex; align-items: center; justify-content: center; }
            #manifesto-panel::before { content: "\f129"; font-family: "Font Awesome 5 Free"; font-weight: 900; color: #ff0000; font-size: 20px; }
            #manifesto-panel .manifesto-quote, #manifesto-panel .manifesto-subquote, #manifesto-panel .m-hint, #manifesto-panel .manifesto-body { display: none; }
            #manifesto-panel.expanded { width: 85vw; height: auto; padding: 20px; left: 7.5vw; bottom: 5vh; display: block; }
            #manifesto-panel.expanded::before { display: none; }
            #manifesto-panel.expanded .manifesto-quote, #manifesto-panel.expanded .manifesto-subquote, #manifesto-panel.expanded .manifesto-body { display: block; }
        }
    </style>
</head>
<body>

    <div id="left-controls">
        <div class="control-box">
            <button class="lang-btn active" onclick="changeLang('tr', event)">TR</button>
            <button class="lang-btn" onclick="changeLang('en', event)">EN</button>
            <button class="lang-btn" onclick="changeLang('de', event)">DE</button>
        </div>
        <div class="control-box">
            <button class="zoom-btn" onclick="map.zoomIn()">+</button>
            <button class="zoom-btn" onclick="map.zoomOut()">−</button>
        </div>
    </div>

    <div id="manifesto-panel" onclick="toggleManifesto(event)">
        <span id="m-quote" class="manifesto-quote">"Yurtta Sulh, Cihanda Sulh."</span>
        <span id="m-sub" class="manifesto-subquote">— Mustafa Kemal Atatürk</span>
        <div class="manifesto-body">
            <span id="m-text"></span>
            <div class="manifesto-credits">
                CURATION: TIMOR NIYAZI<br>
                STRATEGY: ALFRED BÖHLER<br>
                CONTACT: <span style="color:#fff">timor.niyazi6@gmail.com</span>
            </div>
        </div>
        <div class="m-hint" id="m-hint">[ Click to Read Testimony ]</div>
    </div>

    <div id="map"></div>

    <div id="sidebar">
        <span class="close-btn" onclick="closeAllPanels()">&times;</span>
        <div id="sidebar-content">
            <div id="s-image-container"><img id="s-image" src="" alt="Historical Evidence"></div>
            <h2 id="s-title" style="color:#ff0000; font-size:24px; font-weight:900; margin-top:0;"></h2>
            <div id="s-date" style="color:#444; font-size:14px; margin-bottom:20px;"></div>
            <div id="s-details" style="color:#999; font-size:13px; line-height:1.6;"></div>
            
            <div id="ai-analysis-container">
                <h4 style="color:#ff0000; margin:0; font-size:14px;"><i class="fas fa-robot"></i> AI FORENSIC ANALYST</h4>
                <div id="ai-result-text" style="font-size:12px; color:#ccc; margin-top:10px;">Analiz için motoru başlatın.</div>
                <div id="ai-loader"><i class="fas fa-sync fa-spin"></i> Desenler taranıyor...</div>
                <button id="ai-btn" onclick="runAiAnalysis()">DERİN ANALİZİ BAŞLAT</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.js"></script>

    <script>
        let currentLang = 'tr';
        let lastSelected = null;
        const apiKey = "AIzaSyDgXjOXjDuTENAALOAknM-_jVpxxV1rg8w";

        const translations = {
            tr: {
                text: `Bizler, <strong>Timor Niyazi</strong> ve <strong>Alfred Böhler</strong>, insanlığın en karanlık döngüsüne tanıklık ediyoruz. İkinci Dünya Savaşı'nda katledilen milyonlardan sonra dünyanın ders aldığı illüzyonu, tarihin en trajik yanılgısıdır. Eğer insanlık Birinci Dünya Savaşı'nın dehşetini gerçekten anlasaydı, ikincisi asla gerçekleşmezdi. Oysa açgözlülük, bitmek bilmeyen petrol hırsı ve mutlak hegemonya arayışı, insan hayatını sadece istatistiklere indirgedi.<br><br>Bugün bir babanın evladını kaybetmesi, ana akım medya tarafından "stratejik çıkarlar" veya "istenmeyen hasar" adı altında sterilize edilip basitleştiriliyor. Bu proje, yalanları söküp atan dijital bir anıttır. Demokrasi getirme maskesi altında yürütülen vekalet savaşlarını, kaynak hırsızlıklarını ve katliamları ifşa eder. Barışın sadece bir dilek değil, bir zorunluluk olduğuna inanıyoruz. Gerçekleri sansürsüz görmek, bu kanlı döngüyü kırmanın tek yoludur.`
            },
            en: {
                text: `We, <strong>Timor Niyazi</strong> and <strong>Alfred Böhler</strong>, bear witness to humanity's darkest loop. The illusion that the world learned its lesson after WWII is history's most tragic fallacy. Insatiable hunger for oil and the quest for absolute hegemony have reduced human life to mere statistics.<br><br>Today, a father losing his child is sanitized by global media as strategic interest. This project is a digital monument that strips away the lies. Peace is not a wish, it is a necessity.`
            },
            de: {
                text: `Wir, <strong>Timor Niyazi</strong> und <strong>Alfred Böhler</strong>, bezeugen den dunkelsten Kreislauf der Menschheit. Gier und das Streben nach absoluter Hegemonie haben Menschenleben zu bloßen Statistiken degradiert. Die ungeschönte Wahrheit zu sehen, ist der einzige Weg.`
            }
        };

        const map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([20, 10], 2.5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        const clusterGroup = L.markerClusterGroup();

        // HARİTAYA TIKLAYINCA HER ŞEYİ KAPAT
        map.on('click', function() { closeAllPanels(); });

        function closeAllPanels() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('manifesto-panel').classList.remove('expanded');
        }

        function toggleManifesto(e) {
            L.DomEvent.stopPropagation(e);
            const panel = document.getElementById('manifesto-panel');
            if (e.target.closest('.manifesto-body') && panel.classList.contains('expanded')) return;
            panel.classList.toggle('expanded');
        }

        function changeLang(lang, e) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            if(e) e.target.classList.add('active');
            document.getElementById('m-text').innerHTML = translations[currentLang].text;
            if(lastSelected) updateSidebar(lastSelected);
        }

        function updateSidebar(item) {
            lastSelected = item;
            document.getElementById('s-title').innerText = item.name[currentLang];
            document.getElementById('s-date').innerText = "YEAR: " + item.start;
            document.getElementById('ai-result-text').innerText = "Analiz için motoru başlatın.";
            
            const imgBox = document.getElementById('s-image-container');
            const img = document.getElementById('s-image');
            if (item.q10_img) { img.src = item.q10_img; imgBox.style.display = 'flex'; } else { imgBox.style.display = 'none'; }
            
            let html = `<div style="background:#1a0000; border-left:4px solid #ff0000; padding:15px; margin-bottom:20px; font-style:italic;"><strong>PROJECTION:</strong> ${item.ai_prediction[currentLang]}</div>`;
            const d = item.details[currentLang];
            for (let i = 1; i <= 10; i++) {
                if(d[`q${i}_title`]) {
                    html += `<div style="margin-bottom:15px;"><div style="color:#fff; font-size:13px; font-weight:800; text-transform:uppercase;">${d[`q${i}_title`]}</div><div style="color:#999; font-size:12.5px;">${d[`q${i}_text`]}</div></div>`;
                }
            }
            document.getElementById('s-details').innerHTML = html;
            document.getElementById('sidebar').classList.add('active');
        }

        async function runAiAnalysis() {
            if(!lastSelected) return;
            const resText = document.getElementById('ai-result-text');
            const loader = document.getElementById('ai-loader');
            const btn = document.getElementById('ai-btn');
            resText.style.display = 'none';
            loader.style.display = 'block';
            btn.disabled = true;

            try {
                const prompt = `Profesyonel bir adli analiz uzmanı gibi şu vakayı değerlendir: ${lastSelected.name[currentLang]}. Detaylar: ${JSON.stringify(lastSelected.details[currentLang])}. Bu olayın idari suç boyutunu ve tarihteki gerçek yerini kısa ve sarsıcı şekilde Türkçe açıkla.`;
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                resText.innerText = data.candidates[0].content.parts[0].text;
            } catch (err) { resText.innerText = "Hata: YZ motoru meşgul."; }
            finally { resText.style.display = 'block'; loader.style.display = 'none'; btn.disabled = false; }
        }

        async function startApp() {
            changeLang('tr');
            const response = await fetch('archive_data.json');
            const data = await response.json();
            data.forEach(item => {
                const marker = L.circleMarker([item.lat, item.lng], { radius: 6, fillColor: "#ff0000", color: "#fff", weight: 1, fillOpacity: 0.8 });
                marker.on('click', (e) => { 
                    L.DomEvent.stopPropagation(e); 
                    closeAllPanels(); // Önce diğerlerini kapat
                    updateSidebar(item); 
                    map.flyTo([item.lat, item.lng], 7); 
                });
                clusterGroup.addLayer(marker);
            });
            map.addLayer(clusterGroup);
        }
        startApp();
    </script>
</body>
</html>

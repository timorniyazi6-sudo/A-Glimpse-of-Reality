<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Global Hakikat Arşivi | Timor & Alfred</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

    <style>
        body { margin: 0; padding: 0; background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #000; cursor: crosshair; }

        /* SOL ÜST: DİL VE ZOOM KONTROLLERİ */
        #left-controls {
            position: fixed; top: 20px; left: 20px; z-index: 10001;
            display: flex; flex-direction: column; gap: 10px;
        }
        .control-box {
            background: rgba(0, 0, 0, 0.95); border: 1px solid #ff0000;
            border-radius: 4px; padding: 10px; display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }
        .lang-btn, .zoom-btn {
            background: none; border: none; color: #666; cursor: pointer;
            font-weight: 900; transition: 0.3s; font-size: 14px; outline: none;
        }
        .lang-btn.active, .zoom-btn:hover { color: #ff0000; text-shadow: 0 0 8px #ff0000; }
        .zoom-btn { font-size: 20px; border-top: 1px solid #222; padding-top: 5px; }

        /* MANİFESTO PANELİ: AÇILIR KAPANIR DEV PANEL */
        #manifesto-panel {
            position: fixed; bottom: 20px; left: 20px; width: 350px;
            background: rgba(5, 5, 5, 0.98); border: 2px solid #ff0000;
            padding: 20px; z-index: 10005; transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer; overflow: hidden; box-shadow: 0 0 30px #000;
        }
        #manifesto-panel.expanded {
            width: 45vw; height: 70vh; cursor: default; overflow-y: auto;
        }
        .manifesto-quote { color: #fff; font-size: 15px; font-weight: bold; display: block; margin-bottom: 10px; border-left: 4px solid #ff0000; padding-left: 12px; }
        .manifesto-body { color: #aaa; font-size: 13px; line-height: 1.7; display: none; margin-top: 20px; }
        #manifesto-panel.expanded .manifesto-body { display: block; }
        .manifesto-credits { margin-top: 20px; color: #ff0000; font-weight: 900; font-size: 12px; letter-spacing: 1px; }

        /* SAĞ SIDEBAR (DOSYA DETAYLARI) */
        #sidebar { 
            position: fixed; top: 0; right: -500px; width: 450px; height: 100%; 
            background: rgba(5, 5, 5, 0.98); border-left: 2px solid #ff0000;
            z-index: 10002; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); 
            padding: 30px; overflow-y: auto; box-shadow: -20px 0 50px #000;
        }
        #sidebar.active { right: 0; }
        .close-btn { color: #ff0000; cursor: pointer; float: right; font-size: 35px; margin-top: -15px; }

        #ai-prediction-box {
            background: #1a0000; border-left: 4px solid #ff0000;
            padding: 15px; margin: 20px 0; font-style: italic; color: #ffcccc; font-size: 13px;
        }

        /* --- RESPONSIVE (MOBİL VE TABLET) TASARIM --- */
        @media (max-width: 768px) {
            #sidebar { width: 85vw; right: -90vw; padding: 20px; }
            #manifesto-panel { width: 80vw; left: 10px; bottom: 10px; }
            #manifesto-panel.expanded { width: 90vw; height: 80vh; left: 5vw; }
            .sidebar-title { font-size: 20px; }
            #left-controls { top: 10px; left: 10px; }
        }

        /* Marker ve Cluster Stilleri */
        .marker-cluster div { background-color: rgba(255, 0, 0, 0.9); color: #fff; font-weight: bold; }
        .marker-cluster { background-color: rgba(255, 0, 0, 0.1); }
        .leaflet-control-zoom { display: none; }
    </style>
</head>
<body>

    <div id="left-controls">
        <div class="control-box">
            <button class="lang-btn active" onclick="changeLang('tr', event)">TR</button>
            <button class="lang-btn" onclick="changeLang('en', event)">EN</button>
            <button class="lang-btn" onclick="changeLang('de', event)">DE</button>
        </div>
        <div class="control-box">
            <button class="zoom-btn" onclick="map.zoomIn()">+</button>
            <button class="zoom-btn" onclick="map.zoomOut()">−</button>
        </div>
    </div>

    <div id="manifesto-panel" onclick="toggleManifesto(event)">
        <span id="m-quote" class="manifesto-quote">"Yurtta Sulh, Cihanda Sulh."</span>
        <div id="m-body" class="manifesto-body">
            <span id="m-text"></span>
            <div class="manifesto-credits">
                CURATION: TIMOR NIYAZI <br>
                STRATEGY: ALFRED BÖHLER
            </div>
            <div style="margin-top:15px; color:#555; font-size: 10px;">CONTACT: timor.niyazi6@gmail.com</div>
        </div>
        <div id="m-hint" style="font-size: 9px; color: #444; margin-top: 10px;">[ Click to Read Testimony ]</div>
    </div>

    <div id="map"></div>

    <div id="sidebar">
        <span class="close-btn" onclick="closeAllPanels()">&times;</span>
        <div id="sidebar-content">
            <h2 id="s-title" style="color: #ff0000; font-size: 26px; font-weight: 900;">VERİ</h2>
            <div id="s-date" style="color: #444; font-size: 14px; margin-bottom: 20px;"></div>
            <div id="ai-prediction-box">
                <strong>PROJECTION:</strong> <span id="s-prediction"></span>
            </div>
            <div id="s-details"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OverlappingMarkerSpiderfier-Leaflet/0.2.6/oms.min.js"></script>

    <script>
        let currentLang = 'tr';
        let lastSelected = null;

        const translations = {
            tr: {
                quote: `"Yurtta Sulh, Cihanda Sulh." <br><small>— Mustafa Kemal Atatürk</small>`,
                text: `Bizler, <strong>Timor Niyazi</strong> ve <strong>Alfred Böhler</strong>, insanlığın en karanlık döngüsüne tanıklık ediyoruz. İkinci Dünya Savaşı'nda katledilen milyonlardan sonra dünyanın ders aldığı illüzyonu, tarihin en trajik yanılgısıdır. Eğer insanlık Birinci Dünya Savaşı'nın dehşetini gerçekten anlasaydı, ikincisi asla gerçekleşmezdi. Oysa açgözlülük, bitmek bilmeyen petrol hırsı ve mutlak hegemonya arayışı, insan hayatını sadece istatistiklere indirgedi.<br><br>Bugün bir babanın evladını kaybetmesi, ana akım medya tarafından "stratejik çıkarlar" veya "istenmeyen hasar" adı altında sterilize edilip basitleştiriliyor. Bu proje, yalanları söküp atan dijital bir anıttır. Demokrasi getirme maskesi altında yürütülen vekalet savaşlarını, kaynak hırsızlıklarını ve katliamları ifşa eder. Barışın sadece bir dilek değil, bir zorunluluk olduğuna inanıyoruz. Gerçekleri sansürsüz görmek, bu kanlı döngüyü kırmanın tek yoludur.`
            },
            en: {
                quote: `"Peace at Home, Peace in the World." <br><small>— Mustafa Kemal Atatürk</small>`,
                text: `We, <strong>Timor Niyazi</strong> and <strong>Alfred Böhler</strong>, bear witness to humanity's darkest loop. The illusion that the world learned its lesson after WWII is history's most tragic fallacy. If humanity had truly understood the horror of WWI, WWII would never have occurred. Yet, greed, the insatiable hunger for oil, and the quest for absolute hegemony have reduced human life to mere statistics.<br><br>Today, a father losing his child is sanitized and simplified by global media under the guise of strategic interests or collateral damage. This project is a digital monument that strips away the lies of mainstream media. It exposes proxy wars, resource thefts, and massacres masked as bringing democracy. We believe peace is not just a wish, but a necessity. Seeing the raw, unredacted truth is the only way to break this bloody cycle.`
            },
            de: {
                quote: `"Friede in der Heimat, Friede in der Welt." <br><small>— Mustafa Kemal Atatürk</small>`,
                text: `Wir, <strong>Timor Niyazi</strong> und <strong>Alfred Böhler</strong>, bezeugen den dunkelsten Kreislauf der Menschheit. Die Illusion, die Welt hätte nach den Millionen Toten des Zweiten Weltkriegs gelernt, ist der tragischste Irrtum der Geschichte. Hätte die Menschheit das Grauen des Ersten Weltkriegs wirklich verstanden, wäre der Zweite nie geschehen. Doch Gier, der unersättliche Hunger nach Öl und das Streben nach absoluter Hegemonie haben Menschenleben zu bloßen Statistiken degradiert.<br><br>Dieses Projekt ist ein digitales Monument, das die Lügen der Mainstream-Medien entlarvt. Es zeigt die Stellvertreterkriege, den Ressourcenraub und die Massaker auf, die als Demokratisierung getarnt werden. Wir glauben, dass Frieden keine bloße Hoffnung, sondern eine Notwendigkeit ist. Die ungeschönte Wahrheit zu sehen, ist der einzige Weg, diesen blutigen Kreislauf zu durchbrechen.`
            }
        };

        const map = L.map('map', { 
            zoomSnap: 0.1, zoomDelta: 0.5, wheelPxPerZoomLevel: 50, attributionControl: false 
        }).setView([20, 10], 2.5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const oms = new OverlappingMarkerSpiderfier(map, { keepSpiderfied: true, nearbyDistance: 25 });
        const clusterGroup = L.markerClusterGroup({ spiderfyOnMaxZoom: true, showCoverageOnHover: false });

        // Haritaya tıklanınca her şeyi kapat (Marker'a tıklanmadıkça)
        map.on('click', function() { closeAllPanels(); });

        function closeAllPanels() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('manifesto-panel').classList.remove('expanded');
        }

        function toggleManifesto(e) {
            L.DomEvent.stopPropagation(e);
            const panel = document.getElementById('manifesto-panel');
            if (e.target.closest('.manifesto-body') && panel.classList.contains('expanded')) return;
            panel.classList.toggle('expanded');
        }

        function changeLang(lang, e) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            if(e) e.target.classList.add('active');
            document.getElementById('m-quote').innerHTML = translations[currentLang].quote;
            document.getElementById('m-text').innerHTML = translations[currentLang].text;
            if(lastSelected) updateSidebar(lastSelected);
        }

        function updateSidebar(item) {
            lastSelected = item;
            document.getElementById('s-title').innerText = item.name[currentLang];
            document.getElementById('s-date').innerText = "YEAR: " + item.start;
            document.getElementById('s-prediction').innerText = item.ai_prediction[currentLang];
            let html = "";
            const d = item.details[currentLang];
            for (let i = 1; i <= 10; i++) {
                if(d[`q${i}_title`]) {
                    html += `<div style="margin-bottom:15px;"><div style="color:#fff; font-size:13px; font-weight:800; text-transform:uppercase;">${d[`q${i}_title`]}</div><div style="color:#999; font-size:12.5px; line-height:1.7;">${d[`q${i}_text`]}</div></div>`;
                }
            }
            document.getElementById('s-details').innerHTML = html;
            document.getElementById('sidebar').classList.add('active');
        }

        async function startApp() {
            changeLang('tr');
            try {
                const response = await fetch('archive_data.json');
                const fullData = await response.json();
                fullData.forEach(item => {
                    const marker = L.circleMarker([item.lat, item.lng], { radius: 6, fillColor: "#ff0000", color: "#fff", weight: 0.5, fillOpacity: 0.8 });
                    marker.on('click', (e) => { L.DomEvent.stopPropagation(e); updateSidebar(item); map.flyTo([item.lat, item.lng], 8); });
                    oms.addMarker(marker);
                    clusterGroup.addLayer(marker);
                });
                map.addLayer(clusterGroup);
            } catch (err) { console.error("Error loading JSON."); }
        }
        startApp();
    </script>
</body>
</html>
